<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Надя ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
overflow:hidden;
font-family:'Montserrat',sans-serif;
height:100vh;
}

.bg{
position:fixed;
inset:0;
background:url('photo.jpg') center center/cover no-repeat;
filter:brightness(.35);
z-index:-2;
}

.overlay{
position:fixed;
inset:0;
background:linear-gradient(
180deg,
rgba(0,0,0,.15),
rgba(0,0,0,.55)
);
z-index:-1;
}

.main{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.card{
max-width:900px;
width:100%;
text-align:center;
color:white;
background:rgba(255,255,255,.08);
backdrop-filter:blur(15px);
padding:50px;
border-radius:30px;
box-shadow:0 15px 50px rgba(0,0,0,.3);
}

h1{
font-family:'Great Vibes',cursive;
font-size:90px;
margin-bottom:10px;
}

.date{
font-size:24px;
margin-bottom:25px;
}

.message{
font-size:22px;
line-height:1.8;
margin-bottom:30px;
}

#timer{
font-size:28px;
font-weight:700;
margin-bottom:30px;
}

.buttons{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

.btn{
padding:18px 40px;
border:none;
border-radius:50px;
cursor:pointer;
font-size:20px;
font-weight:bold;
transition:.3s;
}

.btn:hover{
transform:scale(1.08);
}

.yes{
background:#ff4f87;
color:white;
}

.no{
background:#555;
color:white;
}

#answer{
margin-top:30px;
font-size:30px;
font-weight:bold;
}

.heart{
position:fixed;
pointer-events:none;
z-index:9999;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(20px);
}
to{
opacity:1;
transform:translateY(0);
}
}

</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="main">

<div class="card">

<h1>Надя ❤️</h1>

<div class="date">
Приглашение на свидание • 26.06.2026
</div>

<div class="message">
Есть люди, которых встречаешь случайно.
<br><br>
А есть люди, которые становятся частью счастья.
<br><br>
С тобой хочется чаще улыбаться,
чаще мечтать и чаще проводить время вместе.
<br><br>
Поэтому у меня есть один важный вопрос...
<br><br>
✨ Пойдёшь со мной на свидание? ✨
</div>

<div id="timer"></div>

<div class="buttons">

<button class="btn yes" onclick="accept()">
Да ❤️
</button>

<button class="btn no" id="noBtn">
Нет 😅
</button>

</div>

<div id="answer"></div>

<audio id="loveSong">
<source src="music.mp3" type="audio/mpeg">
</audio>

</div>

</div>

<script>

const targetDate = new Date("2026-06-26T18:00:00");

function updateTimer(){

const now = new Date();
const diff = targetDate - now;

if(diff <= 0){
document.getElementById("timer").innerHTML =
"❤️ Этот день уже наступил ❤️";
return;
}

const days = Math.floor(diff/(1000*60*60*24));
const hours = Math.floor((diff/(1000*60*60))%24);
const minutes = Math.floor((diff/(1000*60))%60);

document.getElementById("timer").innerHTML =
"До нашего свидания осталось: " +
days + " дн. " +
hours + " ч. " +
minutes + " мин.";
}

updateTimer();
setInterval(updateTimer,1000);

const noBtn = document.getElementById("noBtn");

let attempts = 0;

noBtn.addEventListener("mouseover", moveButton);
noBtn.addEventListener("touchstart", moveButton);

function moveButton(){

attempts++;

if(attempts === 5){
noBtn.innerHTML = "Не получится 😜";
}

if(attempts === 10){
noBtn.innerHTML = "Ответ только Да ❤️";
}

const maxX = window.innerWidth - noBtn.offsetWidth - 20;
const maxY = window.innerHeight - noBtn.offsetHeight - 20;

const randomX = Math.random() * maxX;
const randomY = Math.random() * maxY;

noBtn.style.position = "fixed";
noBtn.style.left = randomX + "px";
noBtn.style.top = randomY + "px";
}

function accept(){

document.getElementById("loveSong").play();

document.getElementById("answer").innerHTML =
"💖 Надя, наше свидание подтверждено! 💖";

createExplosion();

setTimeout(()=>{

document.getElementById("answer").innerHTML = `

<div style="
margin-top:20px;
font-size:32px;
line-height:1.8;
animation:fadeIn 1.5s ease;
">

💖 Надя ❤️

<br><br>

Ты только что сделала меня
самым счастливым человеком ❤️

<br><br>

Жду тебя 26.06.2026

</div>

`;

},2500);
}

function createExplosion(){

for(let i=0;i<300;i++){

const heart = document.createElement("div");

const hearts = [
"❤️","💖","💕","💘",
"💝","💞","💓","💗"
];

heart.innerHTML =
hearts[Math.floor(Math.random()*hearts.length)];

heart.className = "heart";

heart.style.left = "50%";
heart.style.top = "50%";

heart.style.fontSize =
(20 + Math.random()*40) + "px";

document.body.appendChild(heart);

const angle = Math.random()*Math.PI*2;
const distance = 200 + Math.random()*900;

const x = Math.cos(angle)*distance;
const y = Math.sin(angle)*distance;

heart.animate([
{
transform:"translate(0,0) scale(1)",
opacity:1
},
{
transform:`translate(${x}px,${y}px)
rotate(${Math.random()*1080}deg)
scale(.2)`,
opacity:0
}
],{
duration:3500,
easing:"ease-out"
});

setTimeout(()=>{
heart.remove();
},3500);

}

}

</script>

</body>
</html>
